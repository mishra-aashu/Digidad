<!DOCTYPE html>
<html>
<head>
    <title>Spreadsheet Messenger</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input[type="text"] { padding: 8px; width: 200px; margin-right: 10px; }
        button { padding: 8px 12px; cursor: pointer; }
        #chatBox { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        #chatBox div { margin: 5px 0; padding: 8px; border-radius: 5px; max-width: 70%; }
        .me { text-align: right; background-color: #dcf8c6; margin-left: auto; }
        .them { text-align: left; background-color: #f1f0f0; }
        .chat-list-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        #chatList div:hover { background-color: #f9f9f9; }
        .screen { display: none; }
        #loginScreen { display: block; }
        .chat-header { padding-bottom: 10px; border-bottom: 1px solid #ccc; margin-bottom: 10px; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen">
        <h3>Enter Your Phone Number</h3>
        <input type="text" id="phone" placeholder="Your phone number...">
        <button onclick="login()">Login / Register</button>
    </div>

    <!-- Home Screen (Chat List & New Chat) -->
    <div id="homeScreen" class="screen">
        <h3>Your Chats</h3>
        <div id="chatList"></div>
        <hr>
        <h4>Start a New Chat</h4>
        <input type="text" id="newPeerPhone" placeholder="Enter peer's phone...">
        <button onclick="startNewChat()">Chat</button>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="screen">
        <div class="chat-header">
            <button onclick="showHomeScreen()">&#8592; Back</button>
            <h3 style="display: inline-block; margin-left: 10px;" id="chatWith"></h3>
        </div>
        <div id="chatBox"></div>
        <input type="text" id="msg" placeholder="Type a message...">
        <button onclick="sendMsg()">Send</button>
    </div>

    <script>
    // Add event listener for 'Enter' key on message input
    document.getElementById("msg").addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMsg();
        }
    });

    const api = "https://script.google.com/macros/s/AKfycbwCH81OuCzlIAqVUvDXC8kmCArF_PXEmmD7QLkek-A1I5yNX9oWHWAaiOlWtm-Omic/exec";
    let userId = null, peerId = null;
    let messageInterval, chatListInterval;

    // JSONP request function to bypass CORS issues
    function jsonpRequest(url) {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };

            const script = document.createElement('script');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.onerror = reject;
            document.body.appendChild(script);
        });
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.style.display = 'none');
        document.getElementById(screenId).style.display = 'block';
    }

    async function login() {
        const phoneInput = document.getElementById("phone");
        const phone = phoneInput.value;
        if (!phone) { alert("Please enter a phone number."); return; }
        
        // Show loading state
        phoneInput.disabled = true;
        try {
            const data = await jsonpRequest(`${api}?action=login&phone=${phone}`);
            
            // Backend se error aane par alert dikhayein
            if (data.status === 'error') {
                alert('An error occurred: ' + data.message);
                return;
            }

            // Login safal hone par userId set karein aur home screen dikhayein
            userId = data.userId;
            showScreen('homeScreen'); // Turant home screen par switch karein
            showHomeScreen(true); // Chat list refresh setup karein
            renderChatList(data.chats);
        } catch (error) { // Network ya JSONP error hone par
            console.error("Login failed:", error);
            alert("Login request failed. Please check your connection and try again.");
        } finally {
            phoneInput.disabled = false;
        }
    }

    function renderChatList(chats) {
        const chatListDiv = document.getElementById("chatList");
        chatListDiv.innerHTML = "";
        if (chats.length === 0) {
            chatListDiv.innerHTML = "<p>No active chats. Start a new one!</p>";
            return;
        }
        chats.forEach(chat => {
            const div = document.createElement("div");
            div.className = "chat-list-item";
            div.onclick = () => openChat(chat.peerId, chat.peerPhone);

            const time = chat.lastMessage.ts ? new Date(chat.lastMessage.ts).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

            div.innerHTML = `
                <div style="display: flex; justify-content: space-between;">
                    <strong>${chat.peerPhone}</strong>
                    <small>${time}</small>
                </div>
                <p style="margin: 4px 0 0; color: #555;">${chat.lastMessage.msg}</p>
            `;
            chatListDiv.appendChild(div);
        });
    }

    async function startNewChat() {
        const phoneInput = document.getElementById("newPeerPhone");
        const phone = phoneInput.value;
        if (!phone) { alert("Please enter a number to search."); return; }

        phoneInput.disabled = true;
        try {
            const data = await jsonpRequest(`${api}?action=findUser&phone=${phone}`);
            if (data.status === 'found') {
                openChat(data.userId, phone);
            } else {
                alert("User not found.");
            }
        } catch (error) {
            console.error("Find user failed:", error);
            alert("Could not search for the user. Please try again.");
        } finally {
            phoneInput.disabled = false;
        }
    }

    function openChat(pId, pPhone) {
        peerId = pId;
        
        // Stop refreshing the chat list while in a chat
        if (chatListInterval) clearInterval(chatListInterval);
        chatListInterval = null;

        document.getElementById('chatWith').innerText = `Chat with ${pPhone}`;
        showScreen('chatScreen');
        loadMessages();
        if (messageInterval) clearInterval(messageInterval);
        messageInterval = setInterval(loadMessages, 3000); // Auto-refresh messages
    }

    function showHomeScreen(isFirstLoad = false) {
        if (messageInterval) clearInterval(messageInterval);
        if (chatListInterval) clearInterval(chatListInterval);
        peerId = null;
        showScreen('homeScreen');

        // Start auto-refreshing the chat list
        chatListInterval = setInterval(async () => {
            if (!userId) return;
            const data = await jsonpRequest(`${api}?action=login&phone=${document.getElementById("phone").value}`);
            if (data.chats) {
                renderChatList(data.chats);
            }
        }, 5000); // Refresh chat list every 5 seconds

    }

    async function sendMsg() {
        const msgInput = document.getElementById("msg");
        if (!msgInput.value) return;
        await jsonpRequest(`${api}?action=sendMessage&fromId=${userId}&toId=${peerId}&msg=${encodeURIComponent(msgInput.value)}`);
        msgInput.value = "";
        loadMessages();
    }

    async function loadMessages() {
        if (!userId || !peerId) return;
        const data = await jsonpRequest(`${api}?action=getMessages&userId=${userId}&peerId=${peerId}`);
        if (data.status === 'error') {
            console.error("Error loading messages:", data.message);
            // Stop trying if there's an error to avoid spamming
            if (messageInterval) clearInterval(messageInterval);
            return;
        }
        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        data.messages.forEach(m => {
            const div = document.createElement("div");
            div.className = (m.from == userId) ? "me" : "them";
            div.innerText = m.msg + (m.seen === "true" ? " ✔" : "");
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }
    </script>
</body>
</html>
