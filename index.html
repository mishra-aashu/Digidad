    /**
     * Loads messages for the current chat from the server.
     * @param {object} options - Configuration for loading messages.
     * @param {boolean} [options.isInitialLoad=false] - Is this the first page of messages?
     * @param {number} [options.unreadCount=0] - Number of unread messages for the separator.
     * @param {string} [options.beforeTs=null] - Timestamp to fetch messages older than this.
     * @returns {Promise<boolean>} A promise that resolves to true if messages were loaded, false otherwise.
     */
    async function loadMessages(options = {}) {
        const { isInitialLoad = false, unreadCount = 0, beforeTs = null } = options;
        if (!appState.userId || !appState.peerId) return;

        let url = `${API_URL}?action=getMessages&userId=${appState.userId}&peerId=${appState.peerId}`;
        if (beforeTs) {
            url += `&beforeTs=${encodeURIComponent(beforeTs)}`;
        }

        try {
            const data = await jsonpRequest(url);
            
            if (data.status === 'error') {
                console.error("Error loading messages:", data.message);
                if (beforeTs) return false; // Indicate no messages were loaded
                // Don't show toast on regular polling errors to avoid spam
                return;
            }
            if (data.status === 'cleared') {
                // Handle the case where the chat history was cleared on the server
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = '<p style="text-align: center; padding: 20px; color: var(--text-color); opacity: 0.7;">No messages in this chat yet.</p>';
                return;
            }

            // --- New Caching Logic ---
            // Save the latest full message list to localStorage
            const chatId = getChatId(appState.userId, appState.peerId);
            if (chatId) {
                localStorage.setItem(chatId, JSON.stringify(data.messages));
            }
            
            // --- New Typing Indicator Logic ---
            const chatBox = document.getElementById('chatBox');
            const existingIndicator = document.getElementById('typing-indicator');
            if (data.isTyping) {
                if (!existingIndicator) {
                    const indicatorBubble = document.createElement('div');
                    indicatorBubble.id = 'typing-indicator';
                    indicatorBubble.className = 'typing-indicator-bubble';
                    indicatorBubble.innerHTML = '<span></span><span></span><span></span>';
                    chatBox.appendChild(indicatorBubble);
                    scrollToBottom();
                }
            } else {
                if (existingIndicator) {
                    existingIndicator.remove();
                }
            }

            // Handle online status from server data
            document.getElementById('peerStatus').innerText = data.isOnline ? 'Online' : '';

            // Render the UI using the fresh data from the server
            renderMessages(data.messages, isInitialLoad, unreadCount, beforeTs);

            // Mark that the initial load is done so we can use the instant check next time
            if (isInitialLoad) {
                document.getElementById('chatBox').dataset.initialLoadComplete = 'true';
            }
            if (isInitialLoad) {
                scrollToBottom();
            }

            // Return true if messages were loaded, or if there are more to load
            return data.messages.length > 0 || data.hasMore;

        } catch (error) {
            console.error("Network error loading messages:", error);
            return false; // Indicate failure
        }
    }

    /**
     * Loads older messages when the user scrolls to the top.
     */
    async function loadMoreMessages() {
        const chatBox = document.getElementById('chatBox');
        const messageCount = chatBox.querySelectorAll('.message-container').length;

        // --- NEW: Instant check to avoid unnecessary server requests ---
        // If we have fewer than 50 messages, we know we have them all.
        if (messageCount < 50 && chatBox.dataset.initialLoadComplete === 'true') {
            if (chatBox.dataset.allLoaded !== 'true') {
                chatBox.dataset.allLoaded = 'true';
                const noMoreMsg = document.createElement('div');
                noMoreMsg.textContent = 'No older messages';
                noMoreMsg.style.cssText = 'text-align: center; padding: 10px; opacity: 0.5; font-size: 0.9em;';
                chatBox.prepend(noMoreMsg);
            }
            return;
        }

        const oldestMessage = chatBox.querySelector('.message-container[data-timestamp]');
        if (!oldestMessage || chatBox.dataset.loading === 'true') return;

        chatBox.dataset.loading = 'true'; // Prevent multiple loads
        const beforeTs = oldestMessage.dataset.timestamp;

        // Show a subtle loading indicator
        const loader = document.createElement('div');
        loader.id = 'history-loader';
        loader.textContent = 'Loading...';
        loader.style.textAlign = 'center';
        loader.style.padding = '10px';
        loader.style.opacity = '0.7';
        chatBox.prepend(loader);

        const moreMessagesLoaded = await loadMessages({ beforeTs: beforeTs });
        loader.remove(); // Hide loader
        delete chatBox.dataset.loading;

        if (!moreMessagesLoaded) {
            chatBox.dataset.allLoaded = 'true'; // Mark that we've reached the end
            const noMoreMsg = document.createElement('div');
            noMoreMsg.textContent = 'No older messages';
            noMoreMsg.style.cssText = 'text-align: center; padding: 10px; opacity: 0.5; font-size: 0.9em;';
            chatBox.prepend(noMoreMsg);
        }
    }

    /**
     * Replaces a temporary message bubble with the real one from the server.
     * @param {HTMLElement} tempElement - The temporary message container element.
     * @param {Object} realMsg - The final message object from the server.
     */
    function replaceTempMessage(tempElement, realMsg) {
        // Update the dataset to use the real message ID
        tempElement.dataset.messageId = realMsg.id;
        delete tempElement.dataset.tempId;

        // Update the status icon from clock to single tick
        const statusIcon = tempElement.querySelector('.status-icon');
        if (statusIcon) {
            statusIcon.innerHTML = ' ✓'; // Sent icon
        }

        // Re-attach event listeners for the now-permanent message
        const bubble = tempElement.querySelector('.message-bubble');
        if (bubble) {
            addMessageEventListeners(bubble, realMsg);
        }
    }
    /**
     * Renders a single message object and appends it to the chat box.
     * @param {Object} m - The message object to render.
     * @param {boolean} [isNew=false] - Is this a new message (for animation)?
     * @param {boolean} [prepend=false] - Should the message be added to the top?
     */
    function renderSingleMessage(m, isNew = false, prepend = false) {
        const box = document.getElementById("chatBox");
        const isMe = m.from == appState.userId || m.fromId == appState.userId;
        const isTemp = !m.id || m.id.toString().startsWith('temp_');
        const isDeleted = m.msg.includes("[This message was deleted]");

        const messageContainer = document.createElement("div");
        messageContainer.className = `message-container`;
        // Use a data attribute to easily find and replace the temp message later
        if (isTemp) {
            messageContainer.dataset.tempId = m.id;
        } else {
            messageContainer.dataset.messageId = m.id;
            messageContainer.dataset.timestamp = m.ts; // Timestamp ko store karein
        }

        const bubble = document.createElement("div");
        bubble.className = `message-bubble ${isMe ? 'me' : 'them'}`

        // --- Handle Replies ---
        let replyHtml = '';
        if (m.replyTo) {
            replyHtml = `
                <div style="background: rgba(0,0,0,0.1); padding: 6px 10px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid var(--message-me-bg);">
                    <strong style="font-size: 0.9em; color: var(--message-me-color);">${m.replyTo.author}</strong>
                    <p style="font-size: 0.9em; margin: 2px 0; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${m.replyTo.text}
                    </p>
                </div>
            `;
        }

        let statusIconHtml = '';
        if (isMe) {
            if (isTemp) {
                statusIconHtml = '<span class="status-icon"> 🕒</span>'; // Clock for sending
            } else if (m.seen === "true") {
                statusIconHtml = '<span class="status-icon seen"> ✓✓</span>'; // Double check for seen
            } else {
                statusIconHtml = '<span class="status-icon"> ✓</span>'; // Single check for sent
            }
        }
        const timestamp = m.ts ? new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        
        // New structure for WhatsApp-like timestamp
        const metaHtml = `
            <div class="message-meta">
                <small style="font-size: 0.75em; opacity: 0.7;">${timestamp}</small>${statusIconHtml}
            </div>`;
        bubble.innerHTML = `${replyHtml}<span class="message-text">${m.msg}</span>${metaHtml}`;

        // --- Add Reply Icon for Hover/Swipe ---
        const replyIcon = document.createElement('div');
        replyIcon.className = 'reply-icon';
        replyIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>`;
        replyIcon.style[isMe ? 'left' : 'right'] = '-15px'; // Position based on who sent it

        messageContainer.appendChild(bubble);
        messageContainer.appendChild(replyIcon);

        // If it's a new message, add a fade-in animation class after appending
        if (isNew) {
            setTimeout(() => messageContainer.classList.add('new-message-animation'), 10);
        }

        if (prepend) {
            box.prepend(messageContainer);
        } else {
            box.appendChild(messageContainer);
        }

        // Add event listeners for own, non-temporary, non-deleted messages
        if (!isTemp && !isDeleted) {
            addMessageEventListeners(bubble, m);
        }
    }

    /**
     * Attaches context menu event listeners to a message bubble.
     * @param {HTMLElement} bubble - The message bubble element.
     * @param {Object} m - The message object.
     */
    function addMessageEventListeners(bubble, m) {
        const container = bubble.parentElement; // The .message-container
        const replyIcon = container.querySelector('.reply-icon');

        // --- Desktop Feature 1: Hover to show reply icon ---
        container.addEventListener('mouseenter', () => {
            if (window.innerWidth > 768) { // Only on larger screens
                replyIcon.style.opacity = '1';
                replyIcon.style.pointerEvents = 'auto';
            }
        });
        container.addEventListener('mouseleave', () => {
            if (window.innerWidth > 768) {
                replyIcon.style.opacity = '0';
                replyIcon.style.pointerEvents = 'none';
            }
        });
        replyIcon.addEventListener('click', () => initiateReply(m.id, m.msg));

        // --- Desktop Feature 2: Right-click for context menu ---
        bubble.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            showContextMenu(e, m.id, m.msg);
        });

        // --- Mobile Feature 1: Swipe to reply ---
        let startX = 0;
        let dist = 0;
        const swipeThreshold = 60; // How far to swipe to trigger reply

        container.addEventListener('touchstart', (e) => {
            // Don't interfere if it's a multi-touch gesture
            if (e.touches.length > 1) return;
            const touch = e.touches[0];
            startX = touch.clientX;
            dist = 0;
            container.style.transition = 'none'; // Disable transition during swipe
        });

        container.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) return;
            const touch = e.touches[0];
            dist = touch.clientX - startX;
            if (dist > 0) { // Only allow right-swipe
                container.style.transform = `translateX(${dist}px)`;
                // Show reply icon during swipe
                const iconOpacity = Math.min(dist / swipeThreshold, 1);
                replyIcon.style.opacity = iconOpacity;
                replyIcon.style.transform = `translateY(-50%) scale(${iconOpacity})`;
            }
        });

        container.addEventListener('touchend', () => {
            if (dist === 0) return; // This was a tap, not a swipe
            container.style.transition = 'transform 0.3s ease'; // Re-enable transition
            if (dist > swipeThreshold) {
                // Swiped far enough, trigger reply
                initiateReply(m.id, m.msg);
                // Animate back smoothly
                container.style.transform = 'translateX(0)';
            } else {
                // Didn't swipe far enough, just snap back
                container.style.transform = 'translateX(0)';
            }
            replyIcon.style.opacity = '0'; // Hide icon after swipe ends
        });

        // --- Mobile Feature 2: Long-press for context menu ---
        let longPressTimer;
        bubble.addEventListener('touchstart', (e) => {
            // Don't start the timer if it's a multi-touch gesture
            if (e.touches.length > 1) {
                clearTimeout(longPressTimer);
                return;
            }
            longPressTimer = setTimeout(() => {
                e.preventDefault(); // Prevent other events like click from firing
                showContextMenu(e, m.id, m.msg);
            }, 500);
        });
        // Clear the timer if the touch ends or moves, to prevent it from firing
        bubble.addEventListener('touchend', () => clearTimeout(longPressTimer));
        bubble.addEventListener('touchmove', () => clearTimeout(longPressTimer));
    }

    /**
     * Renders an array of message objects into the chat box.
     * @param {Array<Object>} messages - The messages to render.
     * @param {boolean} [shouldScroll=true] - Whether to scroll to the bottom.
     * @param {number} [unreadCount=0] - The number of unread messages, used to place the separator.
     */
    function renderMessages(messages, isInitialLoad = true, unreadCount = 0, beforeTs = null) {
        const box = document.getElementById("chatBox");
        const isScrolledToBottom = box.scrollHeight - box.clientHeight <= box.scrollTop + 10;

        // If it's the initial load, clear everything and render all messages.
        if (shouldScroll) {
            box.innerHTML = "";
            const firstUnreadIndex = unreadCount > 0 ? Math.max(0, messages.length - unreadCount) : -1;

            messages.forEach((m, index) => {
                if (index === firstUnreadIndex) {
                    const separator = document.createElement('div');
                    separator.className = 'unread-separator';
                    separator.textContent = 'Unread Messages';
                    box.appendChild(separator);
                }
                renderSingleMessage(m, false);
            });
        } else if (beforeTs) {
            // This is a pagination load (older messages)
            const firstMessage = box.querySelector('.message-container');
            const oldScrollHeight = box.scrollHeight;

            // Prepend older messages
            messages.reverse().forEach(m => {
                renderSingleMessage(m, false, true); // `true` to prepend
            });

            // Maintain scroll position so the user doesn't jump
            box.scrollTop = box.scrollHeight - oldScrollHeight;

        } else { // This is a regular polling update for new messages
            // For polling updates, be more efficient.
            const existingMessageIds = new Set([...box.querySelectorAll('[data-message-id]')].map(el => el.dataset.messageId));

            messages.forEach(msg => {
                if (!existingMessageIds.has(msg.id)) {
                    // This is a new message, render it.
                    renderSingleMessage(msg, true);
                    // Play sound only for incoming messages
                    const isMe = msg.from == appState.userId || msg.fromId == appState.userId;
                    if (!isMe) {
                        playNotificationSound();
                    }
                } else {
                    // This message already exists, just update its 'seen' status if needed.
                    const element = box.querySelector(`[data-message-id='${msg.id}']`);
                    const statusIcon = element?.querySelector('.status-icon.seen');
                    if (element && msg.seen === 'true' && !statusIcon) {
                        const icon = element.querySelector('.status-icon');
                        if (icon) {
                            icon.innerHTML = ' ✓✓';
                            icon.classList.add('seen');
                        }
                    }
                }
            });

            // Auto-scroll only if the user was already at the bottom.
            if (isScrolledToBottom) {
                scrollToBottom();
            }
        }
    }

    /**
     * Toggles the visibility of the message search input in the chat header.
     */
    function toggleSearch() {
        const searchInput = document.getElementById('chat-search-input'); 
        const isVisible = searchInput.style.display === 'block';
        searchInput.style.display = isVisible ? 'none' : 'block';
        if (isVisible) {
            searchInput.value = ''; // Clear search on hide
            handleSearch({ target: searchInput }); // Trigger search to remove highlights
        } else {
            searchInput.focus();
        }
    }

    /**
     * Handles the search input, highlighting matching text in messages.
     * @param {InputEvent} event - The input event from the search field.
     */
    function handleSearch(event) {
        const searchTerm = event.target.value.toLowerCase();
        const messages = document.querySelectorAll('#chatBox .message-text');

        messages.forEach(msgElement => {
            const originalText = msgElement.textContent;
            if (searchTerm && originalText.toLowerCase().includes(searchTerm)) {
                const regex = new RegExp(`(${searchTerm})`, 'gi');
                msgElement.innerHTML = originalText.replace(regex, '<span class="highlight">$1</span>');
            } else {
                // Restore original text by removing highlight spans
                msgElement.innerHTML = originalText;
            }
        });
    }

    function toggleEmojiPicker() {
        const picker = document.querySelector('emoji-picker');
        const msgInput = document.getElementById('msg');
        picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
        if (picker.style.display === 'block') picker.style.right = (msgInput.nextElementSibling.clientWidth + 20) + 'px';
    }
    // Add this style to your CSS to align the timestamp correctly

    /**
     * Toggles the visibility of the chat theme picker menu.
     */
    function toggleThemePicker() {
        const picker = document.getElementById('theme-picker');
        const isVisible = picker.style.display === 'block';
        picker.style.display = isVisible ? 'none' : 'block';

        if (!isVisible) {
            // Add a one-time listener to close the picker if user clicks away
            setTimeout(() => window.addEventListener('click', hideThemePicker, { once: true }), 0);
        }
    }

    /**
     * Hides the theme picker if the click was outside of it.
     */
    function hideThemePicker(event) {
        const picker = document.getElementById('theme-picker');
        const button = document.getElementById('chat-theme-btn');
        if (picker && !picker.contains(event.target) && !button.contains(event.target)) {
            picker.style.display = 'none';
        }
    }

    /**
     * Sets the theme for the current chat and saves the preference.
     * @param {string} themeClass - The CSS class for the theme.
     */
    async function setChatTheme(themeClass) {
        const chatBox = document.getElementById('chatBox');
        chatBox.className = 'chatBox'; // Reset classes first
        if (themeClass !== 'default') chatBox.classList.add(themeClass);
        showToast('Theme updated!', 'success');
        toggleThemePicker(); // Close the picker
        // Save setting to the server
        await jsonpRequest(`${API_URL}?action=setChatSetting&ownerId=${appState.userId}&peerId=${appState.peerId}&settingKey=theme&settingValue=${themeClass}`);
        refreshChatList(); // Refresh list to get latest settings
    }
    // .message-bubble small { display: block; text-align: right; margin-top: 4px; }

    </script>
